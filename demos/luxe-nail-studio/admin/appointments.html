<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Appointments — Luxe Nail Studio Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
<div class="admin-shell">
  <aside class="admin-sidebar" id="admin-sidebar"></aside>
  <main class="admin-main" id="admin-main"></main>
</div>

<script src="../assets/js/mock-supabase.js"></script>
<script src="../assets/js/i18n.js"></script>
<script src="../assets/js/format.js"></script>
<script src="../assets/js/admin-shell.js"></script>
<script>
let filterStatus = "all";

function actionsFor(a) {
  if (a.status === "pending") return [["accept","accepted","btn-primary","Accept"],["reject","rejected","btn-danger","Reject"]];
  if (a.status === "accepted") return [["confirm","confirmed","btn-primary","Confirm"],["cancel","cancelled_by_salon","btn-danger","Cancel"]];
  if (a.status === "confirmed") return [["complete","completed","btn-primary","Mark Completed"],["noshow","no_show","btn-danger","No-Show"],["cancel","cancelled_by_salon","btn-ghost","Cancel"]];
  return [];
}

async function renderContent() {
  const main = document.getElementById("admin-main");
  const { data: appts } = await sb
    .from("appointments")
    .select("*, clients(full_name, phone_normalized, email), services(name_en, name_fr)")
    .order("appointment_date", { ascending: false });

  const rows = filterStatus === "all" ? (appts || []) : (appts || []).filter((a) => a.status === filterStatus);

  main.innerHTML = `
    <div class="admin-page-head">
      <h2 style="margin:0">Appointments</h2>
      <select id="status-filter" style="max-width:220px">
        ${["all","pending","accepted","confirmed","completed","no_show","rejected","cancelled_by_client","cancelled_by_salon"]
          .map((s) => `<option value="${s}" ${filterStatus===s?"selected":""}>${s === "all" ? "All statuses" : s.replace(/_/g," ")}</option>`).join("")}
      </select>
    </div>
    <div class="card" style="overflow-x:auto">
      <table>
        <thead><tr><th>Ref</th><th>Client</th><th>Service</th><th>Date</th><th>Time</th><th>Status</th><th></th></tr></thead>
        <tbody>
          ${rows.length ? rows.map((a) => `
            <tr>
              <td style="font-family:monospace">${a.reference_number}</td>
              <td>${a.clients ? a.clients.full_name : "—"}<br/><span class="text-muted">${a.clients ? a.clients.phone_normalized : ""}</span></td>
              <td>${a.services ? a.services.name_en : "—"}</td>
              <td>${a.appointment_date}</td>
              <td>${a.start_time.slice(0,5)}</td>
              <td><span class="badge badge-${a.status}">${a.status.replace(/_/g," ")}</span></td>
              <td><div class="row-actions">
                ${actionsFor(a).map(([key, newStatus, cls, label]) => `<button class="btn ${cls} btn-sm" data-appt="${a.id}" data-status="${newStatus}">${label}</button>`).join("")}
              </div></td>
            </tr>`).join("") : `<tr><td colspan="7" class="text-muted" style="text-align:center;padding:2rem">No appointments match this filter.</td></tr>`}
        </tbody>
      </table>
    </div>`;

  document.getElementById("status-filter").addEventListener("change", (e) => { filterStatus = e.target.value; renderContent(); });
  main.querySelectorAll("[data-appt]").forEach((b) => b.addEventListener("click", async () => {
    await sb.from("appointments").update({ status: b.dataset.status }).eq("id", b.dataset.appt);
    renderContent();
  }));
}
initAdminPage(renderContent);
</script>
</body>
</html>
