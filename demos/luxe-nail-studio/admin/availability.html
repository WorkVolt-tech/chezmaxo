<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Availability — Luxe Nail Studio Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
<div class="admin-shell">
  <aside class="admin-sidebar" id="admin-sidebar"></aside>
  <main class="admin-main" id="admin-main"></main>
</div>

<script src="../assets/js/mock-supabase.js"></script>
<script src="../assets/js/i18n.js"></script>
<script src="../assets/js/format.js"></script>
<script src="../assets/js/admin-shell.js"></script>
<script>
const HOURS = [9,10,11,12,13,14,15,16,17];

async function renderContent() {
  const main = document.getElementById("admin-main");
  const today = new Date().toISOString().slice(0, 10);

  const [{ data: slots }, { data: blocked }] = await Promise.all([
    sb.from("availability_slots").select("*").gte("slot_date", today).order("slot_date").order("start_time"),
    sb.from("blocked_dates").select("*").order("blocked_date"),
  ]);

  const byDate = {};
  (slots || []).forEach((s) => { (byDate[s.slot_date] = byDate[s.slot_date] || []).push(s); });
  const dates = Object.keys(byDate).sort();

  main.innerHTML = `
    <div class="admin-page-head"><h2 style="margin:0">Availability</h2></div>

    <div class="card" style="margin-bottom:2rem">
      <h3 style="font-size:1.05rem;margin-bottom:0.9rem">Add slots for a date</h3>
      <div class="mini-form">
        <div class="field"><label>Date</label><input type="date" id="new-slot-date" min="${today}" /></div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:1rem">
        ${HOURS.map((h) => `<label style="display:flex;align-items:center;gap:0.35rem;font-weight:400;font-size:0.85rem;background:var(--lavender-soft);padding:0.4rem 0.7rem;border-radius:999px">
          <input type="checkbox" class="hour-check" value="${h}" style="width:auto"/> ${String(h).padStart(2,"0")}:00
        </label>`).join("")}
      </div>
      <button class="btn btn-primary btn-sm" id="add-slots-btn">Add Selected Times</button>
      <p id="add-slots-msg" class="success-text" style="margin-top:0.6rem"></p>
    </div>

    <div class="card" style="margin-bottom:2rem">
      <h3 style="font-size:1.05rem;margin-bottom:0.9rem">Block a full day</h3>
      <div class="mini-form">
        <div class="field"><label>Date</label><input type="date" id="block-date" min="${today}" /></div>
        <div class="field"><label>Reason (optional, internal)</label><input id="block-reason" placeholder="e.g. Vacation" /></div>
        <button class="btn btn-secondary btn-sm" id="block-date-btn">Block Day</button>
      </div>
      ${blocked && blocked.length ? `<div style="margin-top:0.5rem">${blocked.map((b) => `
        <span class="slot-chip">${b.blocked_date}${b.reason ? " — " + b.reason : ""} <button data-unblock="${b.id}">&times;</button></span>`).join("")}</div>`
        : `<p class="text-muted" style="margin:0">No blocked dates.</p>`}
    </div>

    <h3 style="font-size:1.05rem">Upcoming slots</h3>
    ${dates.length ? dates.map((d) => `
      <div class="day-group">
        <h4 style="font-size:1rem">${new Date(d+"T00:00:00").toLocaleDateString("en-CA",{weekday:"short",month:"short",day:"numeric"})}</h4>
        <div>${byDate[d].map((s) => `
          <span class="slot-chip ${s.is_active ? "" : "inactive"}">
            ${s.start_time.slice(0,5)}
            <button data-toggleslot="${s.id}" data-active="${s.is_active}" style="color:${s.is_active ? "#166534" : "#374151"}">${s.is_active ? "●" : "○"}</button>
            <button data-delslot="${s.id}">&times;</button>
          </span>`).join("")}</div>
      </div>`).join("") : `<p class="text-muted">No upcoming slots — add some above.</p>`}`;

  document.getElementById("add-slots-btn").addEventListener("click", async () => {
    const date = document.getElementById("new-slot-date").value;
    const hours = Array.from(document.querySelectorAll(".hour-check:checked")).map((c) => Number(c.value));
    const msgEl = document.getElementById("add-slots-msg");
    if (!date || !hours.length) { msgEl.className = "error-text"; msgEl.textContent = "Pick a date and at least one time."; return; }
    for (const h of hours) {
      await sb.from("availability_slots").insert({
        slot_date: date, start_time: `${String(h).padStart(2,"0")}:00:00`, end_time: `${String(h+1).padStart(2,"0")}:00:00`,
        max_appointments: 1, is_active: true, internal_note: null,
      });
    }
    renderContent();
  });

  document.getElementById("block-date-btn").addEventListener("click", async () => {
    const date = document.getElementById("block-date").value;
    if (!date) return;
    const reason = document.getElementById("block-reason").value.trim();
    await sb.from("blocked_dates").insert({ blocked_date: date, reason: reason || null, start_time: null });
    renderContent();
  });

  main.querySelectorAll("[data-unblock]").forEach((b) => b.addEventListener("click", async () => {
    await sb.from("blocked_dates").delete().eq("id", b.dataset.unblock);
    renderContent();
  }));
  main.querySelectorAll("[data-toggleslot]").forEach((b) => b.addEventListener("click", async () => {
    await sb.from("availability_slots").update({ is_active: b.dataset.active !== "true" }).eq("id", b.dataset.toggleslot);
    renderContent();
  }));
  main.querySelectorAll("[data-delslot]").forEach((b) => b.addEventListener("click", async () => {
    await sb.from("availability_slots").delete().eq("id", b.dataset.delslot);
    renderContent();
  }));
}
initAdminPage(renderContent);
</script>
</body>
</html>
