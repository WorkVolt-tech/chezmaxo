<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calendar — Luxe Nail Studio Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
<div class="admin-shell">
  <aside class="admin-sidebar" id="admin-sidebar"></aside>
  <main class="admin-main" id="admin-main"></main>
</div>

<script src="../assets/js/mock-supabase.js"></script>
<script src="../assets/js/i18n.js"></script>
<script src="../assets/js/format.js"></script>
<script src="../assets/js/admin-shell.js"></script>
<script>
async function renderContent() {
  const main = document.getElementById("admin-main");
  const today = new Date().toISOString().slice(0, 10);

  const { data: appts } = await sb
    .from("appointments")
    .select("*, clients(full_name, phone_normalized), services(name_en, name_fr)")
    .gte("appointment_date", today)
    .order("appointment_date")
    .order("start_time");

  const active = (appts || []).filter((a) => !["cancelled_by_client", "cancelled_by_salon", "rejected"].includes(a.status));
  const byDate = {};
  active.forEach((a) => { (byDate[a.appointment_date] = byDate[a.appointment_date] || []).push(a); });
  const dates = Object.keys(byDate).sort();

  main.innerHTML = `
    <div class="admin-page-head"><h2 style="margin:0">Calendar — next 21 days</h2></div>
    ${dates.length ? dates.map((d) => `
      <div class="day-group">
        <h4>${new Date(d + "T00:00:00").toLocaleDateString("en-CA", { weekday: "long", month: "long", day: "numeric" })}</h4>
        <div style="display:flex;flex-direction:column;gap:0.6rem">
          ${byDate[d].map((a) => `
            <div class="card" style="display:flex;justify-content:space-between;align-items:center;padding:0.9rem 1.25rem">
              <div>
                <strong>${a.start_time.slice(0,5)}</strong> — ${a.clients ? a.clients.full_name : "—"}
                <p class="text-muted" style="margin:0.15rem 0 0">${a.services ? a.services.name_en : ""}</p>
              </div>
              <span class="badge badge-${a.status}">${a.status.replace(/_/g," ")}</span>
            </div>`).join("")}
        </div>
      </div>`).join("") : `<div class="card"><p class="text-muted" style="margin:0">Nothing scheduled in the next 21 days.</p></div>`}`;
}
initAdminPage(renderContent);
</script>
</body>
</html>
