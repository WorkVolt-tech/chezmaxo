<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clients — Luxe Nail Studio Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
<div class="admin-shell">
  <aside class="admin-sidebar" id="admin-sidebar"></aside>
  <main class="admin-main" id="admin-main"></main>
</div>

<script src="../assets/js/mock-supabase.js"></script>
<script src="../assets/js/i18n.js"></script>
<script src="../assets/js/format.js"></script>
<script src="../assets/js/admin-shell.js"></script>
<script>
async function renderContent() {
  const main = document.getElementById("admin-main");
  const [{ data: clients }, { data: appts }] = await Promise.all([
    sb.from("clients").select("*").order("full_name"),
    sb.from("appointments").select("*"),
  ]);

  main.innerHTML = `
    <div class="admin-page-head"><h2 style="margin:0">Clients</h2></div>
    <div class="card" style="overflow-x:auto">
      <table>
        <thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>Language</th><th>Appointments</th></tr></thead>
        <tbody>
          ${(clients || []).length ? clients.map((c) => {
            const count = (appts || []).filter((a) => a.client_id === c.id).length;
            return `<tr><td>${c.full_name}</td><td>${c.phone_normalized || "—"}</td><td>${c.email || "—"}</td><td>${(c.preferred_language||"").toUpperCase()}</td><td>${count}</td></tr>`;
          }).join("") : `<tr><td colspan="5" class="text-muted" style="text-align:center;padding:2rem">No clients yet — they'll appear here after their first booking.</td></tr>`}
        </tbody>
      </table>
    </div>`;
}
initAdminPage(renderContent);
</script>
</body>
</html>
