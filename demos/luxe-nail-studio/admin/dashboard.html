<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard — Luxe Nail Studio Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
<div class="admin-shell">
  <aside class="admin-sidebar" id="admin-sidebar"></aside>
  <main class="admin-main" id="admin-main"></main>
</div>

<script src="../assets/js/mock-supabase.js"></script>
<script src="../assets/js/i18n.js"></script>
<script src="../assets/js/format.js"></script>
<script src="../assets/js/admin-shell.js"></script>
<script>
async function renderContent() {
  const main = document.getElementById("admin-main");
  const today = new Date().toISOString().slice(0, 10);

  const [{ data: appts }, { data: clients }, { data: messages }] = await Promise.all([
    sb.from("appointments").select("*, clients(full_name, phone_normalized), services(name_en, name_fr)").order("appointment_date"),
    sb.from("clients").select("*"),
    sb.from("messages").select("*"),
  ]);

  const pending = (appts || []).filter((a) => a.status === "pending");
  const todays = (appts || []).filter((a) => a.appointment_date === today && ["accepted", "confirmed"].includes(a.status));
  const unread = (messages || []).filter((m) => m.sender_type === "client" && !m.is_read_by_admin);

  main.innerHTML = `
    <div class="admin-page-head"><h2 style="margin:0">Dashboard</h2></div>
    <div class="grid grid-3" style="margin-bottom:2rem">
      <div class="stat-card"><div class="stat-value">${pending.length}</div><div class="stat-label">Pending requests</div></div>
      <div class="stat-card"><div class="stat-value">${todays.length}</div><div class="stat-label">Appointments today</div></div>
      <div class="stat-card"><div class="stat-value">${clients ? clients.length : 0}</div><div class="stat-label">Total clients</div></div>
    </div>
    <div class="grid grid-2">
      <div>
        <h3 style="font-size:1.1rem">Needs your attention</h3>
        <div id="pending-list" style="display:flex;flex-direction:column;gap:0.75rem;margin-top:0.75rem"></div>
      </div>
      <div>
        <h3 style="font-size:1.1rem">Unread messages</h3>
        <div class="card" style="margin-top:0.75rem">
          ${unread.length
            ? `<p>${unread.length} unread message${unread.length > 1 ? "s" : ""} waiting.</p><a href="messages.html" class="btn btn-secondary btn-sm">Go to Messages</a>`
            : `<p class="text-muted" style="margin:0">All caught up — no unread messages.</p>`}
        </div>
      </div>
    </div>`;

  const listEl = document.getElementById("pending-list");
  if (!pending.length) {
    listEl.innerHTML = `<div class="card"><p class="text-muted" style="margin:0">No pending requests right now.</p></div>`;
  } else {
    listEl.innerHTML = pending.map((a) => `
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <strong>${a.clients ? a.clients.full_name : "—"}</strong>
            <p class="text-muted" style="margin:0.15rem 0 0">${a.services ? a.services.name_en : ""} · ${a.appointment_date} · ${a.start_time.slice(0,5)}</p>
          </div>
          <span class="badge badge-pending">Pending</span>
        </div>
        <div class="row-actions" style="margin-top:0.75rem">
          <button class="btn btn-primary btn-sm" data-accept="${a.id}">Accept</button>
          <button class="btn btn-danger btn-sm" data-reject="${a.id}">Reject</button>
        </div>
      </div>`).join("");

    listEl.querySelectorAll("[data-accept]").forEach((b) => b.addEventListener("click", async () => {
      await sb.from("appointments").update({ status: "accepted" }).eq("id", b.dataset.accept);
      renderContent();
    }));
    listEl.querySelectorAll("[data-reject]").forEach((b) => b.addEventListener("click", async () => {
      await sb.from("appointments").update({ status: "rejected" }).eq("id", b.dataset.reject);
      renderContent();
    }));
  }
}
initAdminPage(renderContent);
</script>
</body>
</html>
