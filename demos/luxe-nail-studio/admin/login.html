<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Login — Luxe Nail Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
<section class="section" style="min-height:100vh;display:flex;align-items:center;">
  <div class="container" style="max-width:420px;">
    <div style="text-align:center;margin-bottom:1.5rem;">
      <div class="logo" style="justify-content:center;display:flex;font-size:1.6rem;">Luxe <span>Nail Studio</span></div>
      <p class="text-muted" style="margin-top:0.25rem;">Admin Dashboard</p>
    </div>
    <div class="card">
      <div class="demo-credentials" id="demo-creds"></div>
      <form id="login-form">
        <div class="field"><label>Email</label><input id="lg-email" type="email" value="demo@luxenailstudio.example" required /></div>
        <div class="field"><label>Password</label><input id="lg-password" type="password" value="demo1234" required /></div>
        <p id="login-error" class="error-text"></p>
        <button class="btn btn-primary" style="width:100%">Sign In</button>
      </form>
    </div>
  </div>
</section>

<script src="../assets/js/mock-supabase.js"></script>
<script src="../assets/js/i18n.js"></script>
<script>
document.getElementById("demo-creds").innerHTML =
  `<strong>Demo mode</strong> — the fields below are pre-filled. Just click Sign In to explore the admin dashboard.`;

document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("lg-email").value.trim();
  const password = document.getElementById("lg-password").value;
  const errorEl = document.getElementById("login-error");
  errorEl.textContent = "";
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { errorEl.textContent = "Invalid email or password."; return; }
  location.href = "dashboard.html";
});

(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) location.href = "dashboard.html";
})();
</script>
</body>
</html>
