<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Messages — Luxe Nail Studio Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
<div class="admin-shell">
  <aside class="admin-sidebar" id="admin-sidebar"></aside>
  <main class="admin-main" id="admin-main"></main>
</div>

<script src="../assets/js/mock-supabase.js"></script>
<script src="../assets/js/i18n.js"></script>
<script src="../assets/js/format.js"></script>
<script src="../assets/js/admin-shell.js"></script>
<script>
let activeConvId = null;

async function renderContent() {
  const main = document.getElementById("admin-main");
  const [{ data: convs }, { data: clients }, { data: messages }] = await Promise.all([
    sb.from("conversations").select("*").order("last_message_at", { ascending: false }),
    sb.from("clients").select("*"),
    sb.from("messages").select("*"),
  ]);

  const clientOf = (id) => (clients || []).find((c) => c.id === id);
  if (!activeConvId && convs && convs.length) activeConvId = convs[0].id;

  main.innerHTML = `
    <div class="admin-page-head"><h2 style="margin:0">Messages</h2></div>
    <div class="card client-thread">
      <div class="thread-list">
        ${(convs || []).length ? (convs || []).map((c) => {
          const client = clientOf(c.client_id);
          const hasUnread = (messages || []).some((m) => m.conversation_id === c.id && m.sender_type === "client" && !m.is_read_by_admin);
          return `<div class="thread-item ${c.id === activeConvId ? "active" : ""}" data-conv="${c.id}">
            ${hasUnread ? `<span class="unread-dot"></span>` : ""}${client ? client.full_name : "Unknown"}
          </div>`;
        }).join("") : `<p class="text-muted" style="padding:0.75rem">No conversations yet.</p>`}
      </div>
      <div style="flex:1" id="thread-panel"></div>
    </div>`;

  main.querySelectorAll("[data-conv]").forEach((el) => el.addEventListener("click", () => { activeConvId = el.dataset.conv; renderContent(); }));

  if (activeConvId) await renderThread(activeConvId, clientOf, convs);
}

async function renderThread(convId, clientOf, convs) {
  const panel = document.getElementById("thread-panel");
  const conv = (convs || []).find((c) => c.id === convId);
  const { data: msgs } = await sb.from("messages").select("*").eq("conversation_id", convId).order("created_at");
  const client = conv ? clientOf(conv.client_id) : null;

  panel.innerHTML = `
    <div class="chat-panel">
      <div style="padding:0.9rem 1rem;border-bottom:1px solid var(--lavender-soft)">
        <strong>${client ? client.full_name : "—"}</strong>
        <p class="text-muted" style="margin:0.15rem 0 0">${client ? (client.phone_normalized || "") : ""} ${client && client.email ? "· " + client.email : ""}</p>
      </div>
      <div class="chat-messages" id="admin-chat-messages">
        ${(msgs || []).map((m) => `<div class="chat-bubble ${m.sender_type === "admin" ? "admin" : "client"}">${m.body || ""}</div>`).join("")}
      </div>
      <form class="chat-input-row" id="admin-chat-form">
        <input id="admin-chat-draft" placeholder="Type a reply…" />
        <button class="btn btn-primary">Send</button>
      </form>
    </div>`;

  const msgsEl = document.getElementById("admin-chat-messages");
  msgsEl.scrollTop = msgsEl.scrollHeight;

  // mark client messages as read
  for (const m of (msgs || [])) {
    if (m.sender_type === "client" && !m.is_read_by_admin) await sb.from("messages").update({ is_read_by_admin: true }).eq("id", m.id);
  }

  document.getElementById("admin-chat-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const input = document.getElementById("admin-chat-draft");
    const body = input.value.trim();
    if (!body) return;
    input.value = "";
    await sb.from("messages").insert({ conversation_id: convId, sender_type: "admin", body, image_url: null, is_read_by_admin: true, is_read_by_client: false });
    await sb.from("conversations").update({ last_message_at: new Date().toISOString() }).eq("id", convId);
    renderThread(convId, clientOf, convs);
  });
}
initAdminPage(renderContent);
</script>
</body>
</html>
