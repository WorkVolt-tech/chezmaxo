<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Services — Luxe Nail Studio Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
<div class="admin-shell">
  <aside class="admin-sidebar" id="admin-sidebar"></aside>
  <main class="admin-main" id="admin-main"></main>
</div>

<script src="../assets/js/mock-supabase.js"></script>
<script src="../assets/js/i18n.js"></script>
<script src="../assets/js/format.js"></script>
<script src="../assets/js/admin-shell.js"></script>
<script>
let editingServiceId = null;
let categories = [];

function serviceFormHtml(svc) {
  const s = svc || { name_en:"", name_fr:"", description_en:"", description_fr:"", duration_minutes:45, price_cents:0, price_is_starting_at:false, category_id: categories[0] ? categories[0].id : "" };
  return `
    <div class="card" style="margin-bottom:1.5rem">
      <h3 style="font-size:1.05rem;margin-bottom:0.9rem">${svc ? "Edit service" : "Add a new service"}</h3>
      <div class="mini-form">
        <div class="field"><label>Category</label><select id="sv-cat">${categories.map((c) => `<option value="${c.id}" ${c.id===s.category_id?"selected":""}>${c.name_en}</option>`).join("")}</select></div>
        <div class="field"><label>Name (EN)</label><input id="sv-name-en" value="${s.name_en}" /></div>
        <div class="field"><label>Name (FR)</label><input id="sv-name-fr" value="${s.name_fr}" /></div>
        <div class="field"><label>Duration (min)</label><input id="sv-duration" type="number" value="${s.duration_minutes}" /></div>
        <div class="field"><label>Price ($)</label><input id="sv-price" type="number" step="0.01" value="${(s.price_cents/100).toFixed(2)}" /></div>
        <label style="display:flex;align-items:center;gap:0.4rem;font-weight:400;font-size:0.85rem"><input type="checkbox" id="sv-starting" style="width:auto" ${s.price_is_starting_at?"checked":""}/> "Starting at" price</label>
      </div>
      <div class="field"><label>Description (EN)</label><textarea id="sv-desc-en" rows="2">${s.description_en||""}</textarea></div>
      <div class="field"><label>Description (FR)</label><textarea id="sv-desc-fr" rows="2">${s.description_fr||""}</textarea></div>
      <div class="row-actions">
        <button class="btn btn-primary btn-sm" id="sv-save">${svc ? "Save Changes" : "Add Service"}</button>
        ${svc ? `<button class="btn btn-ghost btn-sm" id="sv-cancel">Cancel</button>` : ""}
      </div>
    </div>`;
}

async function renderContent() {
  const main = document.getElementById("admin-main");
  const [{ data: cats }, { data: services }] = await Promise.all([
    sb.from("service_categories").select("*").order("display_order"),
    sb.from("services").select("*, service_categories(name_en)").order("display_order"),
  ]);
  categories = cats || [];

  const editingSvc = editingServiceId ? (services || []).find((s) => s.id === editingServiceId) : null;

  main.innerHTML = `
    <div class="admin-page-head"><h2 style="margin:0">Services</h2></div>

    <div class="card" style="margin-bottom:1.5rem">
      <h3 style="font-size:1.05rem;margin-bottom:0.9rem">Categories</h3>
      <div style="margin-bottom:0.9rem">${categories.map((c) => `<span class="slot-chip">${c.name_en} / ${c.name_fr} <button data-delcat="${c.id}">&times;</button></span>`).join("")}</div>
      <div class="mini-form">
        <div class="field"><label>New category (EN)</label><input id="cat-en" /></div>
        <div class="field"><label>New category (FR)</label><input id="cat-fr" /></div>
        <button class="btn btn-secondary btn-sm" id="cat-add">Add Category</button>
      </div>
    </div>

    <div id="service-form-slot">${serviceFormHtml(editingSvc)}</div>

    <div class="card" style="overflow-x:auto">
      <table>
        <thead><tr><th>Service</th><th>Category</th><th>Price</th><th>Duration</th><th>Active</th><th></th></tr></thead>
        <tbody>
          ${(services || []).length ? services.map((s) => `
            <tr>
              <td>${s.name_en}</td>
              <td>${s.service_categories ? s.service_categories.name_en : "—"}</td>
              <td>${s.price_is_starting_at ? "From " : ""}${formatPrice(s.price_cents)}</td>
              <td>${s.duration_minutes} min</td>
              <td><button class="toggle-pill ${s.is_active ? "on" : "off"}" data-toggle="${s.id}" data-active="${s.is_active}">${s.is_active ? "Active" : "Hidden"}</button></td>
              <td><div class="row-actions">
                <button class="btn btn-ghost btn-sm" data-edit="${s.id}">Edit</button>
                <button class="btn btn-danger btn-sm" data-del="${s.id}">Delete</button>
              </div></td>
            </tr>`).join("") : `<tr><td colspan="6" class="text-muted" style="text-align:center;padding:2rem">No services yet.</td></tr>`}
        </tbody>
      </table>
    </div>`;

  document.getElementById("cat-add").addEventListener("click", async () => {
    const en = document.getElementById("cat-en").value.trim();
    const fr = document.getElementById("cat-fr").value.trim();
    if (!en) return;
    await sb.from("service_categories").insert({ name_en: en, name_fr: fr || en, display_order: categories.length + 1 });
    renderContent();
  });
  main.querySelectorAll("[data-delcat]").forEach((b) => b.addEventListener("click", async () => {
    if (!confirm("Delete this category? Services in it will be kept but uncategorized.")) return;
    await sb.from("service_categories").delete().eq("id", b.dataset.delcat);
    renderContent();
  }));

  wireServiceForm(editingSvc);

  main.querySelectorAll("[data-edit]").forEach((b) => b.addEventListener("click", () => { editingServiceId = b.dataset.edit; renderContent(); }));
  main.querySelectorAll("[data-toggle]").forEach((b) => b.addEventListener("click", async () => {
    await sb.from("services").update({ is_active: b.dataset.active !== "true" }).eq("id", b.dataset.toggle);
    renderContent();
  }));
  main.querySelectorAll("[data-del]").forEach((b) => b.addEventListener("click", async () => {
    if (!confirm("Delete this service?")) return;
    await sb.from("services").delete().eq("id", b.dataset.del);
    renderContent();
  }));
}

function wireServiceForm(editingSvc) {
  document.getElementById("sv-save").addEventListener("click", async () => {
    const payload = {
      category_id: document.getElementById("sv-cat").value,
      name_en: document.getElementById("sv-name-en").value.trim(),
      name_fr: document.getElementById("sv-name-fr").value.trim(),
      description_en: document.getElementById("sv-desc-en").value.trim(),
      description_fr: document.getElementById("sv-desc-fr").value.trim(),
      duration_minutes: Number(document.getElementById("sv-duration").value) || 30,
      price_cents: Math.round(Number(document.getElementById("sv-price").value) * 100) || 0,
      price_is_starting_at: document.getElementById("sv-starting").checked,
    };
    if (!payload.name_en) return;
    if (editingSvc) {
      await sb.from("services").update(payload).eq("id", editingSvc.id);
    } else {
      await sb.from("services").insert({ ...payload, is_active: true, display_order: 99 });
    }
    editingServiceId = null;
    renderContent();
  });
  const cancelBtn = document.getElementById("sv-cancel");
  if (cancelBtn) cancelBtn.addEventListener("click", () => { editingServiceId = null; renderContent(); });
}
initAdminPage(renderContent);
</script>
</body>
</html>
