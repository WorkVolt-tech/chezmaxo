<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Settings — Luxe Nail Studio Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
<div class="admin-shell">
  <aside class="admin-sidebar" id="admin-sidebar"></aside>
  <main class="admin-main" id="admin-main"></main>
</div>

<script src="../assets/js/mock-supabase.js"></script>
<script src="../assets/js/i18n.js"></script>
<script src="../assets/js/admin-shell.js"></script>
<script>
const FIELDS = [
  ["salon_name", "Studio name"],
  ["phone", "Phone number"],
  ["email", "Email"],
  ["address", "Address"],
  ["hours", "Hours (shown as-is, line breaks OK)"],
];

async function renderContent() {
  const main = document.getElementById("admin-main");
  const { data: rows } = await sb.from("website_settings").select("*");
  const map = {};
  (rows || []).forEach((r) => { map[r.key] = r; });

  main.innerHTML = `
    <div class="admin-page-head"><h2 style="margin:0">Settings</h2></div>
    <div class="card" style="max-width:640px">
      <p class="text-muted" style="margin-bottom:1.25rem">These appear in your site's header, footer, and contact page.</p>
      ${FIELDS.map(([key, label]) => `
        <div class="field">
          <label>${label} (English)</label>
          ${key === "hours" ? `<textarea id="set-${key}-en" rows="2">${map[key] ? map[key].value_en : ""}</textarea>` : `<input id="set-${key}-en" value="${map[key] ? map[key].value_en : ""}" />`}
        </div>
        <div class="field">
          <label>${label} (Français)</label>
          ${key === "hours" ? `<textarea id="set-${key}-fr" rows="2">${map[key] ? map[key].value_fr : ""}</textarea>` : `<input id="set-${key}-fr" value="${map[key] ? map[key].value_fr : ""}" />`}
        </div>`).join("")}
      <button class="btn btn-primary" id="settings-save">Save Settings</button>
      <p id="settings-msg" class="success-text" style="margin-top:0.75rem"></p>
    </div>`;

  document.getElementById("settings-save").addEventListener("click", async () => {
    for (const [key] of FIELDS) {
      const valueEn = document.getElementById(`set-${key}-en`).value;
      const valueFr = document.getElementById(`set-${key}-fr`).value;
      const existing = map[key];
      if (existing) {
        await sb.from("website_settings").update({ value_en: valueEn, value_fr: valueFr }).eq("key", key);
      } else {
        await sb.from("website_settings").insert({ key, value_en: valueEn, value_fr: valueFr });
      }
    }
    document.getElementById("settings-msg").textContent = "Saved.";
    setTimeout(() => renderContent(), 600);
  });
}
initAdminPage(renderContent);
</script>
</body>
</html>
