<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In | [BUSINESS NAME]</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/dashboard.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabase-client.js"></script>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <h2>[BUSINESS NAME]</h2>
    <p class="sub" id="subtext">Sign in to your client dashboard.</p>
    <div class="auth-toggle">
      <button id="tabSignin" class="active">Sign in</button>
      <button id="tabSignup">Create account</button>
    </div>
    <div class="form-error" id="formError"></div>

    <div id="signupFields">
      <div class="field"><label>Full name</label><input id="fullName" placeholder="Jasmine Torres"></div>
      <div class="field"><label>Business name</label><input id="businessName" placeholder="The Fade Room Barbershop"></div>
    </div>
    <div class="field"><label>Email</label><input id="email" type="email" placeholder="you@business.com"></div>
    <div class="field"><label>Password</label><input id="password" type="password" placeholder="At least 6 characters"></div>
    <button class="btn btn-primary" id="submitBtn" style="width:100%;justify-content:center;">Sign in</button>
  </div>
</div>

<script>
let mode = "signin";

function setMode(m){
  mode = m;
  document.getElementById("tabSignin").classList.toggle("active", m==="signin");
  document.getElementById("tabSignup").classList.toggle("active", m==="signup");
  document.getElementById("signupFields").style.display = m==="signup" ? "block" : "none";
  document.getElementById("submitBtn").textContent = m==="signup" ? "Create account" : "Sign in";
  document.getElementById("subtext").textContent = m==="signup" ? "Set up your client dashboard access." : "Sign in to your client dashboard.";
  hideError();
}
function showError(msg){
  const el = document.getElementById("formError");
  el.textContent = msg;
  el.classList.add("show");
}
function hideError(){ document.getElementById("formError").classList.remove("show"); }

document.getElementById("tabSignin").onclick = () => setMode("signin");
document.getElementById("tabSignup").onclick = () => setMode("signup");

document.getElementById("submitBtn").onclick = async () => {
  hideError();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  if (!email || !password) { showError("Enter your email and password."); return; }

  try {
    if (mode === "signup") {
      const fullName = document.getElementById("fullName").value.trim();
      const businessName = document.getElementById("businessName").value.trim();
      if (!fullName || !businessName) { showError("Enter your name and business name."); return; }
      await signUp(email, password, fullName, businessName);
    } else {
      await signIn(email, password);
    }
    const admin = await isCurrentUserAdmin();
    window.location.href = admin ? "admin-dashboard.html" : "client-portal.html";
  } catch (err) {
    showError(err.message || "Something went wrong. Please try again.");
  }
};

(async () => {
  const session = await getSession();
  if (session) {
    const admin = await isCurrentUserAdmin();
    window.location.href = admin ? "admin-dashboard.html" : "client-portal.html";
  }
})();
</script>
</body>
</html>
